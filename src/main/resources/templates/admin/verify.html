<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Certificate | Certify</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" th:href="@{/images/certify.png}">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="max-w-6xl mx-auto">
    <header th:replace="~{components/header :: header}">
    </header>
    <main class="h-full p-10 lg:p-20 lg:mx-30">
        <div th:if="${cert == null}" class="pb-3">
            <h2 class="text-center font-bold text-2xl">Verify Certificate</h2>
            <p class="text-md text-black/80 text-center">Enter the unique identifier below to verify the authenticity of an academic certificate.</p>
        </div>
        <section th:if="${cert == null}" class="bg-blue-100 w-full h-full p-10 rounded-3xl border border-blue-500">
            <form th:action="@{/verify}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Certificate UID</label>
                    <input name="id" type="text" placeholder="e.g. 8829-XPK-2024" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"/>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">Verify Certificate
                </button>
            </form>
        </section>
        <div th:if="${errorMessage}" class="mt-5 text-center bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl">
            <p th:text="${errorMessage}"></p>
        </div>
        <section th:if="${cert != null}" class="w-full max-w-4xl my-12 bg-white border border-gray-200 rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-green-50 border-b border-gray-200 px-6 py-5 flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-green-700">Verified Certificate</h2>
                    <p class="text-sm text-gray-600"><span class="font-bold">Certificate UID:</span> <span th:text="${certId}"></span></p>
                </div>
                <span class="px-4 py-1 text-sm rounded-full bg-green-100 text-green-700">VALID</span>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 p-6">
                <div class="space-y-3">
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Student Name</p>
                        <p class="text-lg font-semibold text-gray-900" th:text="${cert.studentName}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Student ID</p>
                        <p class="text-gray-700" th:text="${cert.studentId}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Issue Date</p>
                        <p class="text-gray-700" th:text="${cert.issueDate}"></p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Course</p>
                        <p class="text-gray-700" th:text="${cert.course}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Grade</p>
                        <p class="font-semibold text-gray-900" th:text="${cert.grade}"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Issuer</p>
                        <p class="text-gray-700" th:text="${cert.issuer}"></p>
                    </div>
                </div>
            </div>
        </section>
        <div th:if="${cert == null}" class="pt-10 flex justify-around items-center gap-3">
                <img src="https://www.svgrepo.com/show/379291/verified.svg" class="w-11.5" alt="Authentic">
                <img src="https://www.svgrepo.com/show/147478/secure-text-page.svg" class="w-9" alt="Authentic">
                <img src="https://www.svgrepo.com/show/372680/storage.svg" class="w-10" alt="Authentic">
            </div>
    </main>
    <footer th:replace="~{components/footer :: footer}">
    </footer>
</body>
</html>
