<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<section th:fragment="content" class="m-3 lg:m-5">
    <p class="text-blue-500">
        Welcome <span class="underline" th:text="${currUser}"></span>
    </p>
    <div class="py-2 grid grid-cols-1 lg:grid-cols-3 gap-2">
        <div th:each="item : ${dataArr}" class="p-4 bg-white border border-blue-500 rounded-lg shadow">
            <h2 class="font-semibold text-lg" th:text="${item.desc}"></h2>
            <div class="flex justify-between items-center gap-2">
                <p class="text-3xl font-bold text-center text-blue-600" th:text="${item.count}"></p>
                <img src="https://www.svgrepo.com/show/4092/files.svg" alt="Logo" class="w-10">
            </div>
            <p class="text-gray-300 text-sm">*Lifetime</p>
        </div>
    </div>
</section>
</html>
